<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>宿命回响-哈利波特</title>
<style>
:root {
  --bg-deep: #16130e;
  --bg-parchment: #f4ebd0;
  --bg-card: #fdfaf2;
  --bg-input: #ebe0c5;
  --border: #c4b491;
  --border-dark: #3a3121;
  --text-primary: #2c2519;
  --text-secondary: #6e5d47;
  --text-dim: #948268;
  --slytherin: #1a362b;
  --gryffindor: #740001;
  --gold: #bd924a;
  --gold-light: #e5cc96;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'Cinzel', 'Georgia', 'Noto Serif SC', serif;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* 手机移动端主容器 (限制宽度，强制竖屏) */
.app-container {
  width: 100%;
  max-width: 500px;
  height: 100%;
  margin: 0 auto;
  background-color: var(--bg-parchment);
  background-image: radial-gradient(rgba(189,146,74,0.08) 15%, transparent 16%);
  background-size: 16px 16px;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
  border-left: 1px solid var(--border-dark);
  border-right: 1px solid var(--border-dark);
}

/* 顶部流式状态栏 */
.app-header {
  height: 60px;
  background: var(--border-dark);
  color: var(--bg-parchment);
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  z-index: 10;
  padding-top: max(0px, env(safe-area-inset-top));
}

.header-title {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-title svg {
  width: 20px;
  height: 20px;
  fill: var(--gold);
}

.header-title h1 {
  font-size: 15px;
  letter-spacing: 1px;
  font-weight: 700;
}

.header-badge {
  font-size: 11px;
  background: var(--gold);
  color: var(--border-dark);
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: bold;
}

/* 视窗内容滚动面板 */
.app-viewport {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: 90px;
  -webkit-overflow-scrolling: touch;
}

.view-panel {
  display: none;
  flex-direction: column;
  gap: 16px;
  animation: fadeIn 0.25s ease-out;
}

.view-panel.active {
  display: flex;
}

/* ============================================================
iCity 拟真手账卡片架构
============================================================ */
.icity-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 4px 12px rgba(44,37,25,0.06);
  position: relative;
  display: flex;
  flex-direction: column;
}

.icity-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-dim);
  border-bottom: 1px dashed var(--border);
  padding-bottom: 8px;
  margin-bottom: 12px;
}

.icity-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.icity-meta-item svg {
  width: 12px;
  height: 12px;
  fill: var(--text-dim);
}

.icity-user {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.icity-avatar-box {
  width: 44px;
  height: 44px;
  border: 1.5px solid var(--border-dark);
  padding: 2px;
  background: #fff;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.08);
}

.icity-avatar {
  width: 100%;
  height: 100%;
  background: #e2d7bd;
  display: flex;
  align-items: center;
  justify-content: center;
}

.icity-avatar svg {
  width: 22px;
  height: 22px;
  fill: var(--text-secondary);
}

.icity-user-info h3 {
  font-size: 13.5px;
  color: var(--text-primary);
  font-weight: 700;
}

.icity-user-info p {
  font-size: 10px;
  color: var(--text-secondary);
}

.icity-content {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
  text-align: justify;
  margin-bottom: 14px;
  white-space: pre-line;
}

/* 独家巧思：吐真剂激活遮罩 */
.veritaserum-box {
  display: none;
  background: rgba(116, 0, 1, 0.04);
  border-left: 3px solid var(--gryffindor);
  padding: 10px 12px;
  margin-bottom: 14px;
  font-size: 12px;
  color: var(--gryffindor);
  font-style: italic;
  line-height: 1.5;
  animation: slideDown 0.3s ease;
}

.icity-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(196,180,145,0.4);
  padding-top: 10px;
}

.icity-stats {
  display: flex;
  gap: 14px;
  font-size: 11px;
  color: var(--text-dim);
}

.icity-stat-btn {
  display: flex;
  align-items: center;
  gap: 4px;
}

.icity-stat-btn svg {
  width: 13px;
  height: 13px;
  fill: var(--text-dim);
}

/* 巧思触发：滴管 */
.potion-trigger {
  background: linear-gradient(135deg, #2c1e30, var(--slytherin));
  border: none;
  color: #fff;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.potion-trigger svg {
  width: 12px;
  height: 12px;
  fill: #fff;
}

/* 选项组（卡片气泡化） */
.choices-stack {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.choice-bubble {
  background: rgba(189,146,74,0.08);
  border: 1px solid var(--border);
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 12.5px;
  color: var(--text-primary);
  line-height: 1.4;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.choice-bubble:active {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}

/* 消息操作栏 */
.msg-actions {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  justify-content: flex-end;
  border-top: 1px dashed var(--border);
  padding-top: 8px;
}
.msg-action-btn {
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  transition: color 0.2s;
}
.msg-action-btn svg { width: 14px; height: 14px; fill: currentColor; }
.msg-action-btn:active { color: var(--gold); }

/* ============================================================
高级 API 文件夹分区样式
============================================================ */
.api-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.form-group label {
  font-size: 11px;
  font-weight: bold;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 10px;
  font-size: 13px;
  border-radius: 6px;
  outline: none;
  font-family: inherit;
}

/* 手机端独创：Prompt横轴滑块微型文件夹 */
.folder-container {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-top: 4px;
}

.folder-tabs-row {
  display: flex;
  background: #e4d7bd;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.folder-tab-btn {
  flex: 1;
  min-width: 90px;
  padding: 10px 6px;
  background: transparent;
  border: none;
  font-size: 11px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  border-right: 1px solid var(--border);
}

.folder-tab-btn.active {
  background: var(--bg-card);
  color: var(--text-primary);
  font-weight: bold;
}

.folder-body-area {
  background: var(--bg-card);
  padding: 12px;
}

/* 身份库与存读档卡片 */
.list-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.list-card-title {
  font-size: 13.5px;
  font-weight: bold;
  color: var(--text-primary);
}

.list-card-sub {
  font-size: 11px;
  color: var(--text-dim);
}

.hp-btn {
  background: var(--border-dark);
  color: var(--bg-parchment);
  border: none;
  padding: 6px 12px;
  font-size: 11px;
  border-radius: 4px;
  cursor: pointer;
}

.hp-btn:active { background: var(--gold); }

/* 自定义主题弹窗 */
.modal-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(22, 19, 14, 0.8);
  backdrop-filter: blur(4px);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 24px;
}
.modal-box {
  background: var(--bg-card);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 20px;
  width: 100%;
  max-width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align: center;
  animation: fadeIn 0.2s ease-out;
}
.modal-title {
  color: var(--text-primary);
  font-size: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: bold;
}
.modal-title svg { width: 20px; height: 20px; fill: var(--gold); }
.modal-content {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.5;
  white-space: pre-line;
}
.modal-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px;
  font-size: 13px;
  border-radius: 6px;
  outline: none;
  margin-bottom: 16px;
  font-family: inherit;
}
.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.modal-btn {
  background: var(--border-dark);
  color: var(--bg-parchment);
  border: none;
  padding: 8px 16px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  flex: 1;
}
.modal-btn.cancel {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

/* 角色标签 */
.char-tags-container {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.char-tag {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all 0.2s;
}
.char-tag.selected {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}

/* 全屏防摄神取念拦截层 */
.legilimens-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(26,54,43,0.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 24px;
}

.legilimens-box {
  background: var(--bg-card);
  border: 3px double var(--gryffindor);
  border-radius: 12px;
  padding: 24px;
  width: 100%;
  text-align: center;
}

/* 底部魔杖级导航栏 */
.app-navbar {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 68px;
  background: #231d14;
  border-top: 2px solid var(--gold);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 10;
  padding-bottom: max(0px, env(safe-area-inset-bottom));
}

.nav-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  background: transparent;
  border: none;
  cursor: pointer;
  width: 25%;
  height: 100%;
  gap: 4px;
}

.nav-tab svg { width: 18px; height: 18px; fill: currentcolor; }
.nav-tab span { font-size: 10px; }
.nav-tab.active { color: var(--gold-light); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

/* 金色旋转圆圈过渡动画 */
.golden-spinner {
  width: 60px;
  height: 60px;
  animation: spin 2s linear infinite;
}
.golden-spinner .path {
  stroke: var(--gold);
  stroke-linecap: round;
  animation: dash 1.5s ease-in-out infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
@keyframes dash {
  0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
  50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
  100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
}
</style>
</head>
<body>

<div class="app-container">

    <!-- 过渡动画遮罩 -->
    <div class="modal-overlay" id="transitionOverlay" style="display:none; background: var(--bg-deep); z-index: 400; flex-direction: column; justify-content: center; align-items: center;">
        <svg class="golden-spinner" viewBox="0 0 50 50">
            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle>
        </svg>
        <p style="color: var(--gold); margin-top: 20px; font-family: 'Cinzel', serif; letter-spacing: 3px; font-size: 14px;">时空折跃中...</p>
    </div>

    <!-- 首页时代选择遮罩 -->
    <div class="modal-overlay" id="homeScreen" style="display:flex; background: var(--bg-deep); z-index: 300; flex-direction: column; padding: 24px;">
        <div style="text-align:center; margin-bottom: 40px;">
            <svg viewBox="0 0 24 24" style="width:56px;height:56px;fill:var(--gold);margin-bottom:16px;"><path d="M12 2L2 22h20L12 2zm0 3.8l6.2 14.2H5.8L12 5.8z"/></svg>
            <h1 style="color:var(--gold); font-size:24px; font-family:'Cinzel', serif; letter-spacing: 2px;">宿命回响</h1>
            <p style="color:var(--text-dim); font-size:12px; margin-top:8px; letter-spacing: 1px;">请选择你要降临的时代</p>
        </div>
        <div style="display:flex; flex-direction:column; gap:16px;">
            <button class="hp-btn" style="padding:16px; font-size:14px; border: 1px solid var(--gold); background: rgba(189,146,74,0.1); color: var(--gold-light);" onclick="selectEraHome('riddle')">
                <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;vertical-align:middle;margin-right:8px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                里德尔时代 (1943)
            </button>
            <button class="hp-btn" style="padding:16px; font-size:14px; border: 1px solid var(--gold); background: rgba(189,146,74,0.1); color: var(--gold-light);" onclick="selectEraHome('marauders')">
                <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;vertical-align:middle;margin-right:8px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                亲时代 (1976)
            </button>
        </div>
        <button style="margin-top: 32px; background: none; border: none; color: var(--text-dim); text-decoration: underline; font-size: 12px; cursor: pointer;" onclick="document.getElementById('homeScreen').style.display='none'; switchTab('persona');">暂不进入，先去配置档案与API</button>
    </div>

    <!-- 通用自定义弹窗 -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <span id="modalTitleText">提示</span>
            </div>
            <div class="modal-content" id="modalContent"></div>
            <input type="text" class="modal-input" id="modalInput" style="display:none;">
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancelBtn" style="display:none;" onclick="closeModal(false)">取消</button>
                <button class="modal-btn" id="modalConfirmBtn" onclick="closeModal(true)">确认</button>
            </div>
        </div>
    </div>

    <div class="legilimens-overlay" id="legilimensOverlay">
        <div class="legilimens-box">
            <h3 style="color:var(--gryffindor); margin-bottom:8px;">
                <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;vertical-align:middle;margin-right:4px;"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
                警告：遭遇汤姆·里德尔[摄神取念]
            </h3>
            <p style="font-size:12px; color:var(--text-secondary); line-height:1.5; margin-bottom:16px;">
                对方正在利用极其敏锐的黑魔法心智，深度入侵并扫描你在“人设档案”和本地存储里写下的秘密。
            </p>
            <button class="hp-btn" style="background:var(--gryffindor); width:100%; padding:10px;" onclick="closeLegilimens()">
                施展 [大脑封闭术] 进行记忆拦截
            </button>
        </div>
    </div>

    <header class="app-header">
        <div class="header-title">
            <svg viewBox="0 0 24 24"><path d="M19 11.5h-5V3l-9 11h5v8l9-11z"/></svg>
            <h1 id="headerEraTitle">里德尔时代 (1943)</h1>
        </div>
        <div class="header-badge" id="headerLocation">
            <svg viewBox="0 0 24 24" style="width:10px;height:10px;fill:currentColor;vertical-align:middle;margin-right:2px;"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>斯拉格霍恩地下长桌
        </div>
    </header>

    <div class="app-viewport">
        
        <div class="view-panel active" id="panel-timeline">
            <div id="timeline-content" style="display:flex; flex-direction:column; gap:16px; margin-bottom:16px;">
                <!-- 剧情卡片将在这里动态生成 -->
            </div>
            
            <div class="api-card" style="margin-top: auto;">
                <button class="hp-btn" id="btn-show-home" style="width:100%; padding:10px; margin-bottom:12px; background: var(--gold); color: #fff;" onclick="document.getElementById('homeScreen').style.display='flex'">唤出时空折跃门 (选择时代)</button>
                <div class="form-group">
                    <label>你的行动 / 对话 (由你发起剧情)</label>
                    <textarea id="user-action-input" class="form-textarea" rows="3" placeholder="点击发送，对方将首先开始剧情..."></textarea>
                </div>
                <button class="hp-btn" style="width:100%; padding:10px;" onclick="submitUserAction()">发送行动</button>
            </div>
        </div>

        <div class="view-panel" id="panel-persona">
            <div class="api-card" style="margin-bottom: 16px;">
                <h3 style="font-size:13px; margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:4px;">

<script>
// 自定义弹窗逻辑
let modalCallback = null;
function showModal({ title, content, showInput = false, showCancel = false, defaultInput = '', callback }) {
  document.getElementById('modalTitleText').innerText = title || '提示';
  document.getElementById('modalContent').innerHTML = content || '';
  
  const inputEl = document.getElementById('modalInput');
  if (showInput) {
    inputEl.style.display = 'block';
    inputEl.value = defaultInput;
  } else {
    inputEl.style.display = 'none';
  }
  
  document.getElementById('modalCancelBtn').style.display = showCancel ? 'block' : 'none';
  
  modalCallback = callback;
  document.getElementById('customModal').style.display = 'flex';
}

function closeModal(isConfirm) {
  document.getElementById('customModal').style.display = 'none';
  if (modalCallback) {
    const inputVal = document.getElementById('modalInput').value;
    modalCallback(isConfirm, inputVal);
  }
}

function customAlert(msg) {
  showModal({ content: msg });
}
function customConfirm(msg, onConfirm) {
  showModal({ content: msg, showCancel: true, callback: (res) => { if(res) onConfirm(); } });
}
function customPrompt(msg, defaultVal, onConfirm) {
  showModal({ content: msg, showInput: true, showCancel: true, defaultInput: defaultVal, callback: (res, val) => { if(res) onConfirm(val); } });
}

const promptFiles = {
  global: [{ id: 'g1', name: '核心系统限制', content: "[全局核心系统限制]\n1. 文风100%贴合罗琳JK原著风格。\n2. 每一个选项都严格产生连带蝴蝶效应。" }],
  riddle: [{ id: 'r1', name: '里德尔时代细节', content: "[里德尔时代细节魔改提示]\n1. 汤姆在外极具伪装性，优雅、温和。\n2. 独处或遭遇危机时展现强烈的掌控欲。" }],
  marauders: [{ id: 'm1', name: '亲时代细节', content: "[亲时代细节魔改提示]\n1. 契合阿兹卡班及傲罗体制。\n2. 强化阵营割裂对抗与爱恨纠葛。" }]
};

let currentFolder = 'global';
let currentFileId = 'g1';

function renderFileList() {
  const selector = document.getElementById('file-selector');
  selector.innerHTML = '';
  const files = promptFiles[currentFolder];
  if (files.length === 0) {
    selector.innerHTML = '<option value="">(无文件)</option>';
    document.getElementById('prompt-box').value = '';
    document.getElementById('prompt-box').disabled = true;
    return;
  }
  document.getElementById('prompt-box').disabled = false;
  files.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.id;
    opt.innerText = f.name;
    selector.appendChild(opt);
  });
  
  if (!files.find(f => f.id === currentFileId)) {
    currentFileId = files[0].id;
  }
  selector.value = currentFileId;
  document.getElementById('prompt-box').value = files.find(f => f.id === currentFileId).content;
}

function switchTab(panelId) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  
  event.currentTarget.classList.add('active');
  document.getElementById(`panel-${panelId}`).classList.add('active');
  
  if (panelId === 'api') {
    renderFileList();
  }
}

function toggleVeritaserum(id) {
  const box = document.getElementById(`v-box-${id}`);
  box.style.display = (box.style.display === 'block') ? 'none' : 'block';
}

let actionCount = 0;
function selectEraHome(era) {
  const pName = document.getElementById('p-name').value;
  const selectedTags = Array.from(document.querySelectorAll('#target-character-tags .selected')).map(el => el.innerText).join(', ');
  const targetChar = selectedTags || "未选择";
  const eraName = era === 'riddle' ? '里德尔时代 (1943)' : '亲时代 (1976)';
  
  const msg = `即将进入：${eraName}\n\n当前人设：${pName}\n攻略目标：${targetChar}\n\n是否确认进入剧情？`;
  
  customConfirm(msg, () => {
      document.getElementById('homeScreen').style.display = 'none';
      
      const transitionOverlay = document.getElementById('transitionOverlay');
      transitionOverlay.style.display = 'flex';
      
      setTimeout(() => {
          transitionOverlay.style.display = 'none';
          document.getElementById('p-era').value = era;
          syncEraHeader();
          document.getElementById('btn-show-home').style.display = 'none';
          switchTab('timeline');
      }, 1500);
  });
}

function getMsgActionsHTML() {
  return `
    <div class="msg-actions">
        <button class="msg-action-btn" onclick="copyMsg(this)"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>复制</button>
        <button class="msg-action-btn" onclick="editMsg(this)"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>编辑</button>
        <button class="msg-action-btn" onclick="deleteMsg(this)"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>删除</button>
        <button class="msg-action-btn" onclick="resetMsg(this)"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>重置</button>
    </div>
  `;
}

function copyMsg(btn) {
  const content = btn.closest('.icity-card').querySelector('.icity-content').innerText;
  navigator.clipboard.writeText(content).then(() => customAlert("已复制内容到剪贴板"));
}

function deleteMsg(btn) {
  customConfirm("确认删除此条消息记录吗？", () => {
    btn.closest('.icity-card').remove();
  });
}

function editMsg(btn) {
  const contentEl = btn.closest('.icity-card').querySelector('.icity-content');
  customPrompt("编辑消息内容：", contentEl.innerText, (newVal) => {
    if(newVal) contentEl.innerHTML = newVal.replace(/\n/g, '<br>');
  });
}

function resetMsg(btn) {
  customConfirm("确认重新生成/回复此消息吗？", () => {
    const card = btn.closest('.icity-card');
    const contentEl = card.querySelector('.icity-content');
    contentEl.innerHTML = "<span style='color:var(--text-dim)'>重新生成中...</span>";
    setTimeout(() => {
      contentEl.innerHTML = "（重新生成的剧情内容...）";
    }, 800);
  });
}

function submitUserAction(predefinedAction = null) {
  const inputEl = document.getElementById('user-action-input');
  const actionText = predefinedAction || inputEl.value.trim();
  
  const timelineContent = document.getElementById('timeline-content');
  
  // 如果是首次发送且没有输入内容，对面先开始剧情
  if (timelineContent.children.length === 0 && !actionText) {
      executeAIAction("（世界线开始收束...）\n\n对方看着你，率先打破了沉默：“你终于来了。”");
      inputEl.placeholder = "输入你的回应或行动...";
      return;
  }
  
  if (!actionText) return;
  
  customConfirm("确认发送此行动走向吗？\n\n" + actionText, () => {
    executeUserAction(actionText, inputEl, predefinedAction);
  });
}

function executeAIAction(text) {
  const timelineContent = document.getElementById('timeline-content');
  const aiCard = document.createElement('div');
  aiCard.className = 'icity-card';
  const selectedTags = Array.from(document.querySelectorAll('#target-character-tags .selected')).map(el => el.innerText).join(', ');
  const targetChar = selectedTags || '未知角色';
  
  aiCard.innerHTML = `
      <div class="icity-meta">
          <div class="icity-meta-item">
              <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
              来自 ${targetChar} 的回应
          </div>
      </div>
      <div class="icity-content">${text.replace(/\n/g, '<br>')}</div>
      <div class="choices-stack">
          <div class="choice-bubble" onclick="submitUserAction('A. 顺从对方的意愿，展露微笑。')">
              <span>A. 顺从对方的意愿，展露微笑。</span>
          </div>
          <div class="choice-bubble" onclick="submitUserAction('B. 保持警惕，悄悄握紧魔杖。')">
              <span>B. 保持警惕，悄悄握紧魔杖。</span>
          </div>
          <div class="choice-bubble" onclick="document.getElementById('user-action-input').focus()">
              <span>C. (自定义走向，请在下方输入框填写并发送)</span>
          </div>
      </div>
      ${getMsgActionsHTML()}
  `;
  timelineContent.appendChild(aiCard);
  document.querySelector('.app-viewport').scrollTop = document.querySelector('.app-viewport').scrollHeight;
}

function executeUserAction(actionText, inputEl, predefinedAction) {
  actionCount++;
  const timelineContent = document.getElementById('timeline-content');
  
  const userCard = document.createElement('div');
  userCard.className = 'icity-card';
  userCard.innerHTML = `
    <div class="icity-meta">
        <div class="icity-meta-item">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            你的行动
        </div>
    </div>
    <div class="icity-content" style="color: var(--text-secondary); font-style: italic;">
        ${actionText.replace(/\n/g, '<br>')}
    </div>
    ${getMsgActionsHTML()}
  `;
  timelineContent.appendChild(userCard);
  if (!predefinedAction) inputEl.value = '';
  
  // 模拟等待AI响应
  setTimeout(() => {
    executeAIAction("(此处将对接大模型API，根据你的行动生成剧情发展及对方的反应... 对方看着你，似乎在等待你的下一步抉择。)");
  }, 600);
}

function toggleTag(el) {
  el.classList.toggle('selected');
}

function extractCharacters() {
  const text = document.getElementById('script-outline').value;
  // 简单模拟识别
  const mockChars = ["汤姆·里德尔", "阿布拉克萨斯·马尔福", "西弗勒斯·斯内普", "小天狼星·布莱克"];
  const found = mockChars.filter(c => text.includes(c.split('·')[0]));
  
  const container = document.getElementById('target-character-tags');
  if (found.length > 0) {
    container.innerHTML = '';
    found.forEach((c, idx) => {
      const div = document.createElement('div');
      div.className = 'char-tag' + (idx === 0 ? ' selected' : '');
      div.innerText = c;
      div.onclick = function() { toggleTag(this); };
      container.appendChild(div);
    });
    customAlert("已从剧本中识别出潜在角色，请点击勾选作为攻略目标。");
  } else {
    customAlert("未在剧本中识别出预设核心角色，请手动补充。");
  }
}

function triggerLegilimens() {
  document.getElementById('legilimensOverlay').style.display = 'flex';
}

function closeLegilimens() {
  document.getElementById('legilimensOverlay').style.display = 'none';
  customAlert("<svg viewBox='0 0 24 24' style='width:16px;height:16px;fill:currentColor;vertical-align:middle;margin-right:4px;'><path d='M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z'/></svg> [大脑封闭术拦截成功]！你成功隐藏了真实的意识防线，汤姆·里德尔未能探测到你属于穿越者的底层秘密。");
}

function syncEraHeader() {
  const val = document.getElementById('p-era').value;
  document.getElementById('headerEraTitle').innerText = val === 'riddle' ? "里德尔时代 (1943)" : "亲时代 (1976)";
  document.getElementById('headerLocation').innerText = val === 'riddle' ? "📍 斯拉格霍恩地下长桌" : "📍 霍格莫德三把扫帚";
}

function selectFolder(key) {
  document.querySelectorAll('.folder-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`fbtn-${key}`).classList.add('active');
  
  currentFolder = key;
  if (promptFiles[currentFolder].length > 0) {
    currentFileId = promptFiles[currentFolder][0].id;
  }
  renderFileList();
}

function selectFile() {
  currentFileId = document.getElementById('file-selector').value;
  const file = promptFiles[currentFolder].find(f => f.id === currentFileId);
  if (file) {
    document.getElementById('prompt-box').value = file.content;
  }
}

function saveCurrentFile() {
  if (!currentFileId) return;
  const file = promptFiles[currentFolder].find(f => f.id === currentFileId);
  if (file) {
    file.content = document.getElementById('prompt-box').value;
  }
}

function addFile() {
  customPrompt("请输入新Prompt文件的名称：", "新设定文件", (name) => {
    if (name && name.trim()) {
      const newId = 'f_' + Date.now();
      promptFiles[currentFolder].push({ id: newId, name: name.trim(), content: "" });
      currentFileId = newId;
      renderFileList();
    }
  });
}

function deleteFile() {
  if (promptFiles[currentFolder].length === 0) return;
  customConfirm("确定要删除当前选中的Prompt文件吗？", () => {
    promptFiles[currentFolder] = promptFiles[currentFolder].filter(f => f.id !== currentFileId);
    if (promptFiles[currentFolder].length > 0) {
      currentFileId = promptFiles[currentFolder][0].id;
    } else {
      currentFileId = null;
    }
    renderFileList();
  });
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const ext = file.name.split('.').pop().toLowerCase();
  if (['txt', 'json'].includes(ext)) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('script-outline').value = e.target.result;
      customAlert(`成功导入文件：${file.name}`);
    };
    reader.readAsText(file);
  } else if (['doc', 'docx'].includes(ext)) {
    // 纯前端解析Word较复杂，此处做模拟提取提示
    customAlert(`已读取Word文件：${file.name} (模拟提取文本)`);
    document.getElementById('script-outline').value = `[从 ${file.name} 提取的剧本内容...]`;
  } else {
    customAlert("不支持的文件格式！请上传 txt, json, doc 或 docx 文件。");
  }
  event.target.value = ''; // 重置input
}

function fetchModels() {
  const btn = event.target;
  const originalText = btn.innerText;
  btn.innerText = "拉取中...";
  btn.disabled = true;
  
  // 模拟API请求拉取模型列表
  setTimeout(() => {
    const select = document.getElementById('api-model');
    select.innerHTML = `
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4-turbo">gpt-4-turbo</option>
        <option value="claude-3-5-sonnet">claude-3-5-sonnet</option>
        <option value="gemini-1.5-pro">gemini-1.5-pro</option>
        <option value="deepseek-chat">deepseek-chat</option>
    `;
    btn.innerText = originalText;
    btn.disabled = false;
    customAlert("模型列表拉取成功！");
  }, 800);
}
</script>
